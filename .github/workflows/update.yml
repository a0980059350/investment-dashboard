name: Update Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate wallpaper
        run: python dashboard.py

      - name: Commit wallpaper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main

          NEW_BLOB=$(git hash-object wallpaper.png)
          OLD_BLOB=$(git rev-parse origin/main:wallpaper.png 2>/dev/null || echo "")

          NEW_HISTORY_BLOB=$(git hash-object history.json)
          OLD_HISTORY_BLOB=$(git rev-parse origin/main:history.json 2>/dev/null || echo "")

          if [ "$NEW_BLOB" = "$OLD_BLOB" ] && [ "$NEW_HISTORY_BLOB" = "$OLD_HISTORY_BLOB" ]; then
            echo "No changes"
            exit 0
          fi

          git read-tree origin/main
          git update-index --add --cacheinfo 100644,$(git hash-object -w wallpaper.png),wallpaper.png
          git update-index --add --cacheinfo 100644,$(git hash-object -w history.json),history.json

          TREE=$(git write-tree)
          COMMIT=$(git commit-tree "$TREE" -p origin/main -m "更新桌布")

          git push origin "$COMMIT":main
